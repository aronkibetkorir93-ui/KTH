<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kibet Football Hub | Live</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <div class="logo-container">
            <img id="league-logo-display" src="" style="display:none; width: 50px; height: 50px; border-radius: 50%;">
            <h1 id="league-name-display">Kibet Football Hub</h1>
        </div>
        <nav>
            <button onclick="showSection('dashboard')">Standings</button>
            <button onclick="showSection('fixtures')">Fixtures</button>
            <button onclick="showSection('admin')">Admin</button>
        </nav>
    </header>

    <main>
        <section id="dashboard" class="content-section">
            <div class="card" id="standings-card">
                <div class="card-header">
                    <h2>League Standings</h2>
                    <button class="download-btn" onclick="downloadSection('standings-card')">PNG</button>
                </div>
                <table>
                    <thead>
                        <tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="fixtures" class="content-section" style="display:none;">
            <div class="card" id="fixtures-card">
                <div class="card-header">
                    <select id="week-selector" onchange="renderFixtures()"></select>
                </div>
                <div id="match-list"></div>
            </div>
        </section>

        <section id="admin" class="content-section" style="display:none;">
            <div id="login-container" class="card">
                <input type="password" id="admin-pass" placeholder="Password">
                <button class="action-btn" onclick="checkLogin()">Login</button>
            </div>
            <div id="admin-controls" style="display:none;">
                <div class="admin-grid">
                    <div class="admin-card">
                        <h3>Add Team</h3>
                        <input type="text" id="team-name-input" placeholder="Team Name">
                        <input type="file" id="team-logo-upload" accept="image/*">
                        <button class="action-btn" onclick="addTeam()">Add</button>
                    </div>
                    <div class="admin-card">
                        <h3>Teams List</h3>
                        <div id="admin-team-list" class="scroll-box"></div>
                    </div>
                    <div class="admin-card full-width">
                        <h3>Update Results</h3>
                        <div id="admin-matches-list"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
